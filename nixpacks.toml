[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["node -e \"const fs=require('fs'),vars=['ANTHROPIC_API_KEY','WIDGET_API_KEY','CRM_API_KEY','RESEND_API_KEY','FROM_EMAIL','STAFF_EMAIL','DATABASE_PATH','NODE_ENV'];const lines=vars.filter(v=>process.env[v]).map(v=>v+'='+process.env[v]);fs.writeFileSync('.env',lines.join('\\n'));console.log('Wrote .env with',lines.length,'vars');\""]
